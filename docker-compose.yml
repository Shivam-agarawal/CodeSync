services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-8080}:4000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
